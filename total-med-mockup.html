<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Total Med Mockup — IG + FB</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0f0f0f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", system-ui, sans-serif;
    color: #fff;
  }
  body { display: flex; flex-direction: column; }

  .bridge-header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 14px;
    padding: 12px 16px;
    background: linear-gradient(180deg, #1a1a1a 0%, #141414 100%);
    border-bottom: 1px solid #2a2a2a;
    position: relative;
    z-index: 10;
  }

  .bridge-title {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: #888; font-weight: 500; letter-spacing: -0.01em;
  }

  .platform-toggle {
    display: inline-flex;
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 4px;
    gap: 2px;
  }
  .platform-btn {
    background: transparent; border: none;
    color: #999;
    padding: 8px 22px;
    border-radius: 7px;
    font-size: 13px; font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex; align-items: center; gap: 8px;
    letter-spacing: -0.01em;
  }
  .platform-btn:hover { color: #fff; }
  .platform-btn.active { color: #fff; }
  .platform-btn[data-platform="instagram"].active {
    background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    box-shadow: 0 2px 8px rgba(220, 39, 67, 0.35);
  }
  .platform-btn[data-platform="facebook"].active {
    background: #1877f2;
    box-shadow: 0 2px 8px rgba(24, 119, 242, 0.4);
  }
  .platform-btn .ico { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; }
  .platform-btn .ico svg { width: 16px; height: 16px; }

  .bridge-info {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: #555;
    display: flex; align-items: center; gap: 10px;
  }
  .bridge-info-dot { width: 6px; height: 6px; border-radius: 50%; }
  .bridge-info-dot.instagram { background: #e1306c; }
  .bridge-info-dot.facebook { background: #1877f2; }

  .frame-wrap { flex: 1; position: relative; overflow: hidden; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: transparent; }
  iframe.hidden { visibility: hidden; pointer-events: none; }

  @media (max-width: 640px) {
    .bridge-title, .bridge-info { display: none; }
    .bridge-header { padding: 10px; }
    .platform-btn { padding: 7px 16px; font-size: 12px; }
  }
</style>
</head>

  <div class="platform-toggle" role="tablist">

      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <button class="platform-btn" data-platform="facebook" role="tab" aria-selected="false">

</div>

<script>
  // Decode base64-encoded tool HTML and write it into each iframe
  function decodeB64(id) {
    const b64 = document.getElementById(id).textContent.trim();
    // Decode base64 -> UTF-8 string (handles multibyte properly)
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

  const igHtml = decodeB64('ig-data');
  const fbHtml = decodeB64('fb-data');

  const igFrame = document.getElementById('frame-instagram');
  const fbFrame = document.getElementById('frame-facebook');

  // Use srcdoc to inject the full HTML into each iframe
  igFrame.srcdoc = igHtml;
  fbFrame.srcdoc = fbHtml;

  const statusDot = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const buttons = document.querySelectorAll('.platform-btn');

  // Restore last platform preference
  const savedPlatform = localStorage.getItem('tms-bridge-platform') || 'instagram';
  setPlatform(savedPlatform, false);

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      setPlatform(btn.dataset.platform, true);
    });
  });

  function setPlatform(platform, save) {
    buttons.forEach(b => {
      const isActive = b.dataset.platform === platform;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    if (platform === 'instagram') {
      igFrame.classList.remove('hidden');
      fbFrame.classList.add('hidden');
      statusDot.className = 'bridge-info-dot instagram';
      statusLabel.textContent = 'Instagram';
    } else {
      fbFrame.classList.remove('hidden');
      igFrame.classList.add('hidden');
      statusDot.className = 'bridge-info-dot facebook';
      statusLabel.textContent = 'Facebook';
    }

    if (save) {
      try { localStorage.setItem('tms-bridge-platform', platform); } catch(e) {}
    }
  }

  // Keyboard shortcut: cmd/ctrl + 1 = IG, cmd/ctrl + 2 = FB
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && !e.shiftKey && !e.altKey) {
      if (e.key === '1') { e.preventDefault(); setPlatform('instagram', true); }
      else if (e.key === '2') { e.preventDefault(); setPlatform('facebook', true); }
    }
  });
</script>
</body>
